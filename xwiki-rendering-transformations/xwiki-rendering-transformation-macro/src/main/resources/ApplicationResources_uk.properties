rendering.macro.error.standalone=\u041C\u0430\u043A\u0440\u043E\u0441 [{0}] \u0454 \u0430\u0432\u0442\u043E\u043D\u043E\u043C\u043D\u0438\u043C \u0456 \u0439\u043E\u0433\u043E \u043D\u0435 \u043C\u043E\u0436\u043D\u0430 \u0432\u0438\u043A\u043E\u0440\u0438\u0441\u0442\u043E\u0432\u0443\u0432\u0430\u0442\u0438 \u0443 \u0440\u044F\u0434\u043A\u0443.
rendering.macro.error.standalone.description=\u0426\u0435\u0439 \u043C\u0430\u043A\u0440\u043E\u0441 \u0441\u0442\u0432\u043E\u0440\u044E\u0454 \u0430\u0432\u0442\u043E\u043D\u043E\u043C\u043D\u0438\u0439 \u0432\u043C\u0456\u0441\u0442. \u0427\u0435\u0440\u0435\u0437 \u0446\u0435 \u0432\u0430\u043C \u043F\u043E\u0442\u0440\u0456\u0431\u043D\u043E \u043F\u0435\u0440\u0435\u043A\u043E\u043D\u0430\u0442\u0438\u0441\u044F, \u0449\u043E \u0432\u0438 \u0432\u0438\u043A\u043E\u0440\u0438\u0441\u0442\u043E\u0432\u0443\u0454\u0442\u0435 \u0441\u0438\u043D\u0442\u0430\u043A\u0441\u0438\u0441, \u044F\u043A\u0438\u0439 \u0432\u0456\u0434\u043E\u043A\u0440\u0435\u043C\u043B\u044E\u0454 \u043C\u0430\u043A\u0440\u043E\u0441 \u0432\u0456\u0434 \u0432\u043C\u0456\u0441\u0442\u0443 \u0434\u043E \u0442\u0430 \u043F\u0456\u0441\u043B\u044F \u043D\u044C\u043E\u0433\u043E, \u0449\u043E\u0431 \u0432\u0456\u043D \u0437\u043D\u0430\u0445\u043E\u0434\u0438\u0432\u0441\u044F \u0432 \u043E\u043A\u0440\u0435\u043C\u043E\u043C\u0443 \u0440\u044F\u0434\u043A\u0443. \u041D\u0430\u043F\u0440\u0438\u043A\u043B\u0430\u0434, \u0443 \u0441\u0438\u043D\u0442\u0430\u043A\u0441\u0438\u0441\u0456 XWiki 2.0+ \u0446\u0435 \u043E\u0437\u043D\u0430\u0447\u0430\u0454 \u043D\u0430\u044F\u0432\u043D\u0456\u0441\u0442\u044C 2 \u0441\u0438\u043C\u0432\u043E\u043B\u0456\u0432 \u043D\u043E\u0432\u043E\u0433\u043E \u0440\u044F\u0434\u043A\u0430 (\u0440\u043E\u0437\u0440\u0438\u0432\u0456\u0432 \u0440\u044F\u0434\u043A\u0456\u0432), \u044F\u043A\u0456 \u0432\u0456\u0434\u043E\u043A\u0440\u0435\u043C\u043B\u044E\u044E\u0442\u044C \u043C\u0430\u043A\u0440\u043E\u0441 \u0432\u0456\u0434 \u0432\u043C\u0456\u0441\u0442\u0443 \u0434\u043E \u0442\u0430 \u043F\u0456\u0441\u043B\u044F \u043D\u044C\u043E\u0433\u043E.
