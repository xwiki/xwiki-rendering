rendering.macro.info.parameter.status.description=\u0412\u0438\u043A\u043E\u0440\u0438\u0441\u0442\u043E\u0432\u0443\u0439\u0442\u0435 \u0446\u0435, \u044F\u043A\u0449\u043E \u0432\u0430\u0448\u0435 \u043F\u043E\u0432\u0456\u0434\u043E\u043C\u043B\u0435\u043D\u043D\u044F \u0441\u0442\u0432\u043E\u0440\u044E\u0454\u0442\u044C\u0441\u044F \u0434\u0438\u043D\u0430\u043C\u0456\u0447\u043D\u043E \u0430\u0431\u043E \u043C\u0456\u0441\u0442\u0438\u0442\u044C \u0456\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0456\u044E \u043F\u0440\u043E \u043F\u043E\u0442\u043E\u0447\u043D\u0438\u0439 \u0441\u0442\u0430\u0442\u0443\u0441 \u043F\u0440\u043E\u0446\u0435\u0441\u0443. \u041D\u0430\u043F\u0440\u0438\u043A\u043B\u0430\u0434, \u043F\u0456\u0441\u043B\u044F \u043D\u0430\u0434\u0441\u0438\u043B\u0430\u043D\u043D\u044F \u0444\u043E\u0440\u043C\u0438 \u0432\u0430\u0448\u0435 \u043F\u043E\u0432\u0456\u0434\u043E\u043C\u043B\u0435\u043D\u043D\u044F \u043D\u0430\u0434\u0430\u0454 \u043A\u043E\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447\u0435\u0432\u0456 \u0437\u0432\u043E\u0440\u043E\u0442\u043D\u0438\u0439 \u0437\u0432'\u044F\u0437\u043E\u043A \u043F\u0440\u043E \u0441\u0442\u0430\u0442\u0443\u0441 \u0439\u043E\u0433\u043E \u0437\u0430\u043F\u0438\u0442\u0443. \u0426\u0435 \u0433\u0430\u0440\u0430\u043D\u0442\u0443\u0454, \u0449\u043E \u043D\u0430\u0432\u0456\u0442\u044C \u043A\u043E\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447\u0456 \u0434\u043E\u043F\u043E\u043C\u0456\u0436\u043D\u0438\u0445 \u0442\u0435\u0445\u043D\u043E\u043B\u043E\u0433\u0456\u0439 \u043E\u0442\u0440\u0438\u043C\u0430\u044E\u0442\u044C \u0441\u043F\u043E\u0432\u0456\u0449\u0435\u043D\u043D\u044F \u043F\u0440\u043E \u0432\u043C\u0456\u0441\u0442 \u0432\u0430\u0448\u043E\u0433\u043E \u043F\u043E\u0432\u0456\u0434\u043E\u043C\u043B\u0435\u043D\u043D\u044F.
rendering.macro.error.parameter.status.name=\u0421\u0442\u0430\u0442\u0443\u0441
rendering.macro.error.parameter.status.description=\u0412\u0438\u043A\u043E\u0440\u0438\u0441\u0442\u043E\u0432\u0443\u0439\u0442\u0435 \u0446\u0435, \u044F\u043A\u0449\u043E \u0432\u0430\u0448\u0435 \u043F\u043E\u0432\u0456\u0434\u043E\u043C\u043B\u0435\u043D\u043D\u044F \u0441\u0442\u0432\u043E\u0440\u044E\u0454\u0442\u044C\u0441\u044F \u0434\u0438\u043D\u0430\u043C\u0456\u0447\u043D\u043E \u0430\u0431\u043E \u043C\u0456\u0441\u0442\u0438\u0442\u044C \u0456\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0456\u044E \u043F\u0440\u043E \u043F\u043E\u0442\u043E\u0447\u043D\u0438\u0439 \u0441\u0442\u0430\u0442\u0443\u0441 \u043F\u0440\u043E\u0446\u0435\u0441\u0443. \u041D\u0430\u043F\u0440\u0438\u043A\u043B\u0430\u0434, \u043F\u0456\u0441\u043B\u044F \u043D\u0430\u0434\u0441\u0438\u043B\u0430\u043D\u043D\u044F \u0444\u043E\u0440\u043C\u0438 \u0432\u0430\u0448\u0435 \u043F\u043E\u0432\u0456\u0434\u043E\u043C\u043B\u0435\u043D\u043D\u044F \u043D\u0430\u0434\u0430\u0454 \u043A\u043E\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447\u0435\u0432\u0456 \u0437\u0432\u043E\u0440\u043E\u0442\u043D\u0438\u0439 \u0437\u0432'\u044F\u0437\u043E\u043A \u043F\u0440\u043E \u0441\u0442\u0430\u0442\u0443\u0441 \u0439\u043E\u0433\u043E \u0437\u0430\u043F\u0438\u0442\u0443. \u0426\u0435 \u0433\u0430\u0440\u0430\u043D\u0442\u0443\u0454, \u0449\u043E \u043D\u0430\u0432\u0456\u0442\u044C \u043A\u043E\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447\u0456 \u0434\u043E\u043F\u043E\u043C\u0456\u0436\u043D\u0438\u0445 \u0442\u0435\u0445\u043D\u043E\u043B\u043E\u0433\u0456\u0439 \u043E\u0442\u0440\u0438\u043C\u0430\u044E\u0442\u044C \u0441\u043F\u043E\u0432\u0456\u0449\u0435\u043D\u043D\u044F \u043F\u0440\u043E \u0432\u043C\u0456\u0441\u0442 \u0432\u0430\u0448\u043E\u0433\u043E \u043F\u043E\u0432\u0456\u0434\u043E\u043C\u043B\u0435\u043D\u043D\u044F.
rendering.macro.success.parameter.status.name=\u0421\u0442\u0430\u0442\u0443\u0441
rendering.macro.success.parameter.status.description=\u0412\u0438\u043A\u043E\u0440\u0438\u0441\u0442\u043E\u0432\u0443\u0439\u0442\u0435 \u0446\u0435, \u044F\u043A\u0449\u043E \u0432\u0430\u0448\u0435 \u043F\u043E\u0432\u0456\u0434\u043E\u043C\u043B\u0435\u043D\u043D\u044F \u0441\u0442\u0432\u043E\u0440\u044E\u0454\u0442\u044C\u0441\u044F \u0434\u0438\u043D\u0430\u043C\u0456\u0447\u043D\u043E \u0430\u0431\u043E \u043C\u0456\u0441\u0442\u0438\u0442\u044C \u0456\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0456\u044E \u043F\u0440\u043E \u043F\u043E\u0442\u043E\u0447\u043D\u0438\u0439 \u0441\u0442\u0430\u0442\u0443\u0441 \u043F\u0440\u043E\u0446\u0435\u0441\u0443. \u041D\u0430\u043F\u0440\u0438\u043A\u043B\u0430\u0434, \u043F\u0456\u0441\u043B\u044F \u043D\u0430\u0434\u0441\u0438\u043B\u0430\u043D\u043D\u044F \u0444\u043E\u0440\u043C\u0438 \u0432\u0430\u0448\u0435 \u043F\u043E\u0432\u0456\u0434\u043E\u043C\u043B\u0435\u043D\u043D\u044F \u043D\u0430\u0434\u0430\u0454 \u043A\u043E\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447\u0435\u0432\u0456 \u0437\u0432\u043E\u0440\u043E\u0442\u043D\u0438\u0439 \u0437\u0432'\u044F\u0437\u043E\u043A \u043F\u0440\u043E \u0441\u0442\u0430\u0442\u0443\u0441 \u0439\u043E\u0433\u043E \u0437\u0430\u043F\u0438\u0442\u0443. \u0426\u0435 \u0433\u0430\u0440\u0430\u043D\u0442\u0443\u0454, \u0449\u043E \u043D\u0430\u0432\u0456\u0442\u044C \u043A\u043E\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447\u0456 \u0434\u043E\u043F\u043E\u043C\u0456\u0436\u043D\u0438\u0445 \u0442\u0435\u0445\u043D\u043E\u043B\u043E\u0433\u0456\u0439 \u043E\u0442\u0440\u0438\u043C\u0430\u044E\u0442\u044C \u0441\u043F\u043E\u0432\u0456\u0449\u0435\u043D\u043D\u044F \u043F\u0440\u043E \u0432\u043C\u0456\u0441\u0442 \u0432\u0430\u0448\u043E\u0433\u043E \u043F\u043E\u0432\u0456\u0434\u043E\u043C\u043B\u0435\u043D\u043D\u044F.
rendering.macro.warning.parameter.status.name=\u0421\u0442\u0430\u0442\u0443\u0441
rendering.macro.warning.parameter.status.description=\u0412\u0438\u043A\u043E\u0440\u0438\u0441\u0442\u043E\u0432\u0443\u0439\u0442\u0435 \u0446\u0435, \u044F\u043A\u0449\u043E \u0432\u0430\u0448\u0435 \u043F\u043E\u0432\u0456\u0434\u043E\u043C\u043B\u0435\u043D\u043D\u044F \u0441\u0442\u0432\u043E\u0440\u044E\u0454\u0442\u044C\u0441\u044F \u0434\u0438\u043D\u0430\u043C\u0456\u0447\u043D\u043E \u0430\u0431\u043E \u043C\u0456\u0441\u0442\u0438\u0442\u044C \u0456\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0456\u044E \u043F\u0440\u043E \u043F\u043E\u0442\u043E\u0447\u043D\u0438\u0439 \u0441\u0442\u0430\u0442\u0443\u0441 \u043F\u0440\u043E\u0446\u0435\u0441\u0443. \u041D\u0430\u043F\u0440\u0438\u043A\u043B\u0430\u0434, \u043F\u0456\u0441\u043B\u044F \u043D\u0430\u0434\u0441\u0438\u043B\u0430\u043D\u043D\u044F \u0444\u043E\u0440\u043C\u0438 \u0432\u0430\u0448\u0435 \u043F\u043E\u0432\u0456\u0434\u043E\u043C\u043B\u0435\u043D\u043D\u044F \u043D\u0430\u0434\u0430\u0454 \u043A\u043E\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447\u0435\u0432\u0456 \u0437\u0432\u043E\u0440\u043E\u0442\u043D\u0438\u0439 \u0437\u0432'\u044F\u0437\u043E\u043A \u043F\u0440\u043E \u0441\u0442\u0430\u0442\u0443\u0441 \u0439\u043E\u0433\u043E \u0437\u0430\u043F\u0438\u0442\u0443. \u0426\u0435 \u0433\u0430\u0440\u0430\u043D\u0442\u0443\u0454, \u0449\u043E \u043D\u0430\u0432\u0456\u0442\u044C \u043A\u043E\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447\u0456 \u0434\u043E\u043F\u043E\u043C\u0456\u0436\u043D\u0438\u0445 \u0442\u0435\u0445\u043D\u043E\u043B\u043E\u0433\u0456\u0439 \u043E\u0442\u0440\u0438\u043C\u0430\u044E\u0442\u044C \u0441\u043F\u043E\u0432\u0456\u0449\u0435\u043D\u043D\u044F \u043F\u0440\u043E \u0432\u043C\u0456\u0441\u0442 \u0432\u0430\u0448\u043E\u0433\u043E \u043F\u043E\u0432\u0456\u0434\u043E\u043C\u043B\u0435\u043D\u043D\u044F.
